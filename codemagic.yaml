workflows:
  android-workflow:
    name: HeartLink Android Build
    max_build_duration: 60
    environment:
      flutter: 3.19.0
      java: 17
    scripts:
      - name: Extract Flutter project
        script: |
          cd /Users/builder/clone
          if [ -f heartlink_flutter.zip ]; then
            unzip -o heartlink_flutter.zip
            cp -r heartlink_flutter/. .
          fi
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - aryanyadav12125@gmail.com
        notify:
          success: true
          failure: true
