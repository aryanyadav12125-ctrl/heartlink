name: Build HeartLink APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create project
        run: |
          flutter create --org com.heartlink --project-name heartlink_app /tmp/hl
          cp lib/main.dart /tmp/hl/lib/main.dart
          cat > /tmp/hl/pubspec.yaml << 'EOF'
          name: heartlink_app
          description: HeartLink Couple App
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            firebase_core: ^2.32.0
            firebase_auth: ^4.20.0
            firebase_database: ^10.5.7
            google_fonts: ^6.2.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.2
          flutter:
            uses-material-design: true
          EOF

      - name: Get dependencies
        working-directory: /tmp/hl
        run: flutter pub get

      - name: Build APK
        working-directory: /tmp/hl
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: heartlink-apk
          path: /tmp/hl/build/app/outputs/flutter-apk/app-release.apk
