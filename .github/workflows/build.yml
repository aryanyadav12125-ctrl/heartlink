name: Build HeartLink APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Build
        run: |
          flutter create --org com.heartlink --project-name heartlink_app /tmp/hl
          cp lib/main.dart /tmp/hl/lib/main.dart
          mkdir -p /tmp/hl/android/app/src/main/kotlin/com/heartlink/heartlink_app
          cp android/app/src/main/kotlin/com/heartlink/heartlink_app/MainActivity.kt /tmp/hl/android/app/src/main/kotlin/com/heartlink/heartlink_app/MainActivity.kt
          cd /tmp/hl
          printf 'name: heartlink_app\ndescription: HeartLink\npublish_to: none\nversion: 1.0.0+1\nenvironment:\n  sdk: ">=3.0.0 <4.0.0"\ndependencies:\n  flutter:\n    sdk: flutter\n  firebase_core: ^2.32.0\n  firebase_auth: ^4.20.0\n  firebase_database: ^10.5.7\n  google_fonts: ^6.2.0\ndev_dependencies:\n  flutter_test:\n    sdk: flutter\n  flutter_lints: ^3.0.2\nflutter:\n  uses-material-design: true\n' > pubspec.yaml
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: heartlink-apk
          path: /tmp/hl/build/app/outputs/flutter-apk/app-release.apk
