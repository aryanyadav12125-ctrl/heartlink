name: Build HeartLink APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Flutter project structure
        run: |
          flutter create --org com.heartlink --project-name heartlink_app /tmp/heartlink_build
          cp -f lib/main.dart /tmp/heartlink_build/lib/main.dart
          cp -f pubspec.yaml /tmp/heartlink_build/pubspec.yaml

      - name: Get dependencies
        working-directory: /tmp/heartlink_build
        run: flutter pub get

      - name: Build APK
        working-directory: /tmp/heartlink_build
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: heartlink-apk
          path: /tmp/heartlink_build/build/app/outputs/flutter-apk/app-release.apk
